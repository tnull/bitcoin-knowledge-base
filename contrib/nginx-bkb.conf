# Bitcoin Knowledge Base -- nginx reverse proxy
# Install: cp contrib/nginx-bkb.conf /etc/nginx/sites-available/bkb
#          ln -s /etc/nginx/sites-available/bkb /etc/nginx/sites-enabled/
#          nginx -t && systemctl reload nginx
#          certbot --nginx -d bitcoinknowledge.dev
#
# certbot will modify this file to add the HTTPS server block,
# ssl_certificate directives, and an HTTP-to-HTTPS redirect.

server {
    listen 80;
    listen [::]:80;
    server_name bitcoinknowledge.dev;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}
