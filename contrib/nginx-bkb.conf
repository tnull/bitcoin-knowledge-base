# Bitcoin Knowledge Base -- nginx reverse proxy
# Install: cp contrib/nginx-bkb.conf /etc/nginx/sites-available/bkb
#          ln -s /etc/nginx/sites-available/bkb /etc/nginx/sites-enabled/
#          certbot --nginx -d bitcoinknowledge.dev
#          systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name bitcoinknowledge.dev;

    # certbot will add the HTTPS redirect and TLS block here
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bitcoinknowledge.dev;

    # certbot will fill these in
    # ssl_certificate /etc/letsencrypt/live/bitcoinknowledge.dev/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/bitcoinknowledge.dev/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running ingestion health checks
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}
